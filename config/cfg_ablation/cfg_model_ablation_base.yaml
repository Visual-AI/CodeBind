# imagebind baseline

encoder:
  # ---  dim of trunk feature vector ---
  trunk_embed_dim:
    vision: 1280
    text:    768
    audio:   768
    depth:   384
    thermal: 768
    imu:     512
    tactile: 768
    eeg:     768

  # ---  dim of alined/common feature vector ---
  output_embed_dim:
    common: 1024      # Fixed  
    vision:  0  
    text:    0
    audio:   0
    depth:   0
    thermal: 0
    imu:     0
    tactile: 0
    eeg:     0

  # head
  add_new_output_head: False  # output_embed_dim中任意specific dim，则需add_new_output_head
  use_both_head: False

  # postprocessor
  use_postprocessors_outencoder: False
  learnable_postprocessors: False

decoder:
  use_decoder: False   # False 则不会使用decoder，其下的其余参数不会生效


# vector_quantise is None 