# # # # #
# Config file for eval the model on Clotho dataset.
#
# # # # #
# data
datasets: clotho
scale_factor: 1                 # replicate the dataset x scale_factor
batch_size: 40                  # on each GPU
max_epochs: 40
num_workers: 8                   # Number of workers for data loading

# train
train: False
train_mode: headtune
modality_train: audio
modality_pair: [audio, text]    # modality to aline
modality_eval: audio              # Modality to eval, choices=["vision", "text", "audio", "thermal", "depth", "imu"],

# params
lr: 5e-5
lr_new: 5e-4
weight_decay: 1e-4
momentum_betas: [0.9, 0.95]
gradient_clip_val: 1.0
temperature: 0.05                 # Temperature parameter for InfoNCE loss
self_contrast: False
intra_anchor_align: True # enable text and vision alignment when three modalities are aligned

# loss
val_loss: False  # whether to calculate validation loss

# -------------------- Common settings -------------------
seed: 43                          # Random seed for reproducibility

# lora
# lora_rank: 4                      # Rank of LoRA layers
# lora_modality_names: [audio]          # Modality names to apply LoRA
# lora_layer_idxs_audio: [0, 1, 2, 3, 4, 5, 6, 7, 8]
# lora_module_mode: all  # all, attn_out, attn

clotho_root: ./.datasets/Clotho