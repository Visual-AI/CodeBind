# # # # #
# Config file for training the model on SUN-RGBD dataset.
#
# # # # #
expname: exp_eeg

# data
datasets: eeg
scale_factor: 2                  # replicate the dataset x scale_factor
batch_size: 8                   # on each GPU
max_epochs: 40
num_workers: 8                   # Number of workers for data loading
text_template: imagenet           # simple, imagenet or scene


# ---
# train_mode: fulltune
# modality_train: [eeg]

# train
train: True
train_mode: lora
modality_train: [eeg, vision, text]
modality_pair: [eeg, vision, text]    # modality to aline
modality_eval: eeg              # Modality to eval, choices=["vision", "text", "audio", "thermal", "depth", "imu"], 'vision', 'tactile', 'text'
modality_reconstruction: [vision]

# params
lr: 5e-4
lr_new: 5e-4
weight_decay: 1e-4
momentum_betas: [0.9, 0.95]
gradient_clip_val: 1.0
temperature: 0.07                 # Temperature parameter for InfoNCE loss
self_contrast: False
intra_anchor_align: True # enable text and vision alignment when three modalities are aligned

# loss
val_loss: True  # whether to calculate validation loss
loss_vq_weight: 10
loss_vq_reg_weight: 0.01
loss_cmcm_weight: 0.1
loss_modal_decomp_weight: 0.05
loss_uniform_weight: 0.1

# -------------------- Common settings -------------------
seed: 43                          # Random seed for reproducibility

# lora
lora_rank: 4                      # Rank of LoRA layers
lora_modality_names: [eeg]          # Modality names to apply LoRA
lora_layer_idxs_eeg: [3, 4, 5]
lora_module_mode: all  # all, attn_out, attn

# Directory containing the datasets
eeg_root: ./.datasets/EEG

eeg_conf:
  time_low: 20
  time_high: 460
  data_len: 440
  patch_size: 1
